server.port=8080
spring.application.name=api-gateway

# CORS Configurations
spring.cloud.gateway.mvc.cors.configurations.[/**].allowedOrigins=*
spring.cloud.gateway.mvc.cors.configurations.[/**].allowedMethods=*
spring.cloud.gateway.mvc.cors.configurations.[/**].allowedHeaders=*


# Config Server import is already defined in gateway properties if needed, but not required since the config server serves this file itself.
# Spring Cloud Gateway MVC Routes
spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=lb://auth-service
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.mvc.routes[1].id=attendance-service
spring.cloud.gateway.mvc.routes[1].uri=lb://attendance-service
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/attendance/**

spring.cloud.gateway.mvc.routes[2].id=leave-service
spring.cloud.gateway.mvc.routes[2].uri=lb://leave-service
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/leaves/**

spring.cloud.gateway.mvc.routes[3].id=hr-service
spring.cloud.gateway.mvc.routes[3].uri=lb://hr-service
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/hr/**
