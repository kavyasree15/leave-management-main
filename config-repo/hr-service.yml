server:
  port: 8084

spring:
  application:
    name: hr-service

resilience4j:
  circuitbreaker:
    instances:
      hrBackend:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2000
  retry:
    instances:
      hrBackend:
        maxAttempts: 3
        waitDuration: 1000
